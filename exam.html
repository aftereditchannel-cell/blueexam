<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Exam</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="loader.css">
</head>
<body>

<div class="container">
  <h2 id="examTitle">Loading Exam...</h2>

  <div id="questionBox"></div>

  <input id="studentId" placeholder="National ID">

  <button id="submitBtn" onclick="submitExam()">Submit</button>

  <div class="loader" id="loader"></div>
</div>

<script src="script.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const examId = params.get("id");
let correctAnswer = null;

window.onload = () => {
  if (!examId) {
    document.getElementById("examTitle").innerText = "Invalid exam link";
    return;
  }
  loadExam();
};

async function loadExam() {
  try {
    document.getElementById("loader").style.display = "block";

    const res = await fetch(SCRIPT_URL + "?id=" + examId);
    const data = await res.json();

    document.getElementById("loader").style.display = "none";

    if (!data || data.length === 0) {
      document.getElementById("examTitle").innerText = "Exam not found";
      return;
    }

    const exam = data[0];

    document.getElementById("examTitle").innerText = exam[3];

    document.getElementById("questionBox").innerHTML = `
      <p><strong>${exam[4]}</strong></p>
      <label><input type="radio" name="ans" value="1"> ${exam[5]}</label><br><br>
      <label><input type="radio" name="ans" value="2"> ${exam[6]}</label><br><br>
      <label><input type="radio" name="ans" value="3"> ${exam[7]}</label><br><br>
      <label><input type="radio" name="ans" value="4"> ${exam[8]}</label><br><br>
    `;

    correctAnswer = String(exam[9]);

  } catch (err) {
    document.getElementById("loader").style.display = "none";
    console.error(err);
    document.getElementById("examTitle").innerText = "Error loading exam";
  }
}

async function submitExam() {

  const selectedOption = document.querySelector("input[name='ans']:checked");

  if (!selectedOption) {
    alert("Please select an answer");
    return;
  }

  const studentNationalId = document.getElementById("studentId").value.trim();

  if (!studentNationalId) {
    alert("Please enter National ID");
    return;
  }

  const score = selectedOption.value === correctAnswer ? 1 : 0;

  document.getElementById("loader").style.display = "block";
  document.getElementById("submitBtn").disabled = true;

  try {
    await sendData({
      type: "result",
      examId: examId,
      teacher: "",
      title: "",
      question: "",
      opt1: "",
      opt2: "",
      opt3: "",
      opt4: "",
      correct: "",
      studentId: studentNationalId,
      score: score
    });

    document.getElementById("loader").style.display = "none";

    alert("Your Score: " + score);

  } catch (err) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("submitBtn").disabled = false;
    alert("Error submitting exam");
  }
}
</script>

</body>
</html>
