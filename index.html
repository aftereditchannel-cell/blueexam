<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Panel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="loader.css">
</head>
<body>

<div class="container">
  <h2>Teacher Panel</h2>

  <!-- SIGN UP -->
  <div id="signupBox">
    <h3>Sign Up</h3>
    <input id="su_name" placeholder="Full Name">
    <input id="su_nationalId" placeholder="National ID">
    <input id="su_phone" placeholder="Phone Number">
    <input id="su_school" placeholder="School Name">
    <button id="signupBtn">Register</button>
    <div class="loader" id="signupLoader"></div>
  </div>

  <hr>

  <!-- SIGN IN -->
  <div id="loginBox">
    <h3>Sign In</h3>
    <input id="si_nationalId" placeholder="National ID">
    <button id="signinBtn">Login</button>
    <div class="loader" id="signinLoader"></div>
  </div>

  <button onclick="toggleTheme()">Change Theme</button>
</div>

<script src="script.js"></script>
<script>
document.getElementById("signupBtn").addEventListener("click", signUp);
document.getElementById("signinBtn").addEventListener("click", signIn);
</script>

</body>
</html>
